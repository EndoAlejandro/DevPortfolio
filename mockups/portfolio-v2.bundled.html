document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

xt-transform:uppercase;color:var(--accent,#CB2957);margin-bottom:26px;\">Solo game developer · VR &amp; mobile · open to work<\u002Fdiv>\n        <h1 style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(38px,6vw,66px);line-height:1.02;letter-spacing:-.025em;margin:0 0 24px;\">Designer by profession, game developer <span style=\"color:var(--accent,#CB2957);\">by choice.<\u002Fspan><\u002Fh1>\n        <p style=\"font-size:clamp(16px,1.6vw,18.5px);line-height:1.62;max-width:540px;color:var(--hero-sub,rgba(238,238,238,.68));margin:0 0 34px;\">I'm <strong style=\"color:var(--hero-ink,#EEEEEE);font-weight:700;\">Alejandro Endo<\u002Fstrong> — an interactive-media designer with 6 years in software and 3.5 focused on Unity. Since 2021 I've lived in VR, chasing the elusive craft of <em>game feel<\u002Fem> across a shelf of solo-built games.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:12px;margin-bottom:32px;\">\n          <a href=\"#work\" style=\"font-family:'Space Grotesk';font-weight:600;font-size:15px;color:#EEEEEE;background:var(--accent,#CB2957);border-radius:11px;padding:13px 24px;text-decoration:none;transition:opacity .15s;\" style-hover=\"opacity:.88;\">See my games →<\u002Fa>\n          <a href=\"#contact\" style=\"font-family:'Space Grotesk';font-weight:600;font-size:15px;color:var(--hero-ink,#EEEEEE);background:transparent;border:1px solid var(--hero-chip,rgba(238,238,238,.28));border-radius:11px;padding:13px 24px;text-decoration:none;transition:border-color .15s;\" style-hover=\"border-color:var(--accent,#CB2957);\">Download CV<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:9px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.03em;\">\n          <a href=\"https://alejandroendo.itch.io/\" target=\"_blank\" style=\"color:var(--hero-ink,#EEEEEE);text-decoration:none;border:1px solid var(--hero-chip,rgba(238,238,238,.22));border-radius:8px;padding:7px 13px;\" style-hover=\"border-color:var(--accent,#CB2957);color:var(--accent,#CB2957);\">itch.io<\u002Fa>\n          <a href=\"#\" style=\"color:var(--hero-ink,#EEEEEE);text-decoration:none;border:1px solid var(--hero-chip,rgba(238,238,238,.22));border-radius:8px;padding:7px 13px;\" style-hover=\"border-color:var(--accent,#CB2957);color:var(--accent,#CB2957);\">Google Play<\u002Fa>\n          <a href=\"https://www.linkedin.com/in/alejandro-endo-5b5636129/\" target=\"_blank\" style=\"color:var(--hero-ink,#EEEEEE);text-decoration:none;border:1px solid var(--hero-chip,rgba(238,238,238,.22));border-radius:8px;padding:7px 13px;\" style-hover=\"border-color:var(--accent,#CB2957);color:var(--accent,#CB2957);\">LinkedIn<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:0 1 340px;min-width:260px;display:flex;justify-content:center;position:relative;\">\n        <div style=\"position:relative;width:300px;height:300px;\">\n          <div style=\"position:absolute;top:16px;left:16px;width:300px;height:300px;border-radius:22px;background:var(--accent,#CB2957);\"><\u002Fdiv>\n          <image-slot id=\"ae_portrait\" shape=\"rounded\" radius=\"22\" placeholder=\"Drop your portrait\" style=\"position:relative;width:300px;height:300px;border:1px solid rgba(0,0,0,.15);border-radius:22px;display:block;background:#DDDDDD;\"><\u002Fimage-slot>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- WORK -->\n  <section id=\"work\" style=\"max-width:1180px;margin:0 auto;padding:96px 28px 34px;scroll-margin-top:80px;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:44px;\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--accent,#CB2957);margin-bottom:12px;\">Selected games<\u002Fdiv>\n        <h2 style=\"font-family:'Space Grotesk';font-weight:700;font-size:c );margin-bottom:14px;\">About<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(28px,3.6vw,38px);margin:0 0 20px;letter-spacing:-.02em;\">Designer first, developer always.<\u002Fh2>\n      <p style=\"font-size:16px;line-height:1.68;color:rgba(26,26,26,.78);margin:0 0 16px;\">I'm an interactive-media designer with a solid software-engineering background and 6 years of professional experience. For the last 3.5 I've specialised in Unity, mostly VR and mobile — and since 2021 I've poured my free time into side projects, honing gameplay dynamics and the elusive craft of <em>game feel<\u002Fem>.<\u002Fp>\n      <p style=\"font-size:16px;line-height:1.68;color:rgba(26,26,26,.78);margin:0 0 30px;\">I recently graduated with honours from an MSc in Game Development at Universal Arts School, where I shipped several games as a solo developer. My goal is always the same: a final product that's captivating, satisfying, and genuinely enjoyable to play.<\u002Fp>\n      <div style=\"display:flex;gap:36px;flex-wrap:wrap;\">\n        <div><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:36px;color:var(--accent,#CB2957);line-height:1;\">6<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;text-transform:uppercase;color:rgba(26,26,26,.55);margin-top:6px;letter-spacing:.04em;\">Years in software<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:36px;color:var(--accent,#CB2957);line-height:1;\">3.5<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;text-transform:uppercase;color:rgba(26,26,26,.55);margin-top:6px;letter-spacing:.04em;\">Years in Unity / VR<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:36px;color:var(--accent,#CB2957);line-height:1;\">7<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;text-transform:uppercase;color:rgba(26,26,26,.55);margin-top:6px;letter-spacing:.04em;\">Games shipped<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- DEVLOG -->\n  <section id=\"log\" style=\"max-width:1180px;margin:0 auto;padding:20px 28px 96px;scroll-margin-top:80px;\">\n    <div style=\"margin-bottom:32px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--accent,#CB2957);margin-bottom:12px;\">Devlog<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(28px,3.6vw,38px);margin:0;letter-spacing:-.02em;\">Notes from the workbench<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #DDDDDD;border-radius:18px;overflow:hidden;background:#FCFCFC;box-shadow:var(--shadow-sm,0 4px 16px rgba(0,0,0,.05));\">\n      <sc-for list=\"{{ logs }}\" as=\"log\" hint-placeholder-count=\"3\">\n        <a href=\"#log\" style=\"display:flex;align-items:center;justify-content:space-between;gap:20px;padding:24px 28px;border-bottom:1px solid #DDDDDD;text-decoration:none;color:inherit;flex-wrap:wrap;transition:background .15s;\" style-hover=\"background:#EEEEEE;\">\n          <div style=\"display:flex;align-items:baseline;gap:22px;flex:1 1 320px;min-width:0;\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--accent,#CB2957);flex-shrink:0;width:60px;\">{{ log.date }}<\u002Fspan>\n            <span style=\"font-family:'Space Grotesk';font-weight:600;font-size:18px;color:#1A1A1A;letter-spacing:-.01em;\">{{ log.title }}<\u002Fspan>\n          <\u002Fdiv>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:rgba(26,26,26,.45);flex-shrink:0;\">{{ log.read }} →<\u002Fspan>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT -->\n  <section id=\"contact\" style=\"background:var(--accent,#CB2957);scroll-margin-top:80px;\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:92px 28px;text-align:center;color:#EEEEEE;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:rgba(238,238,238,.72);margin-bottom:18px;\">Let's talk<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(32px,5vw,56px);line-height:1.06;margin:0 auto 22px;max-width:780px;letter-spacing:-.025em;\">Need a solo dev who sweats the game feel?<\u002Fh2>\n      <p style=\"font-size:18px;line-height:1.6;max-width:520px;margin:0 auto 36px;color:rgba(238,238,238,.92);\">I'm open to gameplay, systems, VR and mobile roles — remote or relocating. Let's make something that feels great to play.<\u002Fp>\n      <div style=\"display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:32px;\">\n        <a href=\"https://www.linkedin.com/in/alejandro-endo-5b5636129/\" target=\"_blank\" style=\"font-family:'Space Grotesk';font-weight:600;font-size:16px;color:#1A1A1A;background:#EEEEEE;border-radius:11px;padding:14px 26px;text-decoration:none;transition:transform .15s;\" style-hover=\"transform:translateY(-2px);\">Message me on LinkedIn<\u002Fa>\n        <a href=\"#\" style=\"font-family:'Space Grotesk';font-weight:600;font-size:16px;color:#EEEEEE;background:#1A1A1A;border-radius:11px;padding:14px 26px;text-decoration:none;transition:transform .15s;\" style-hover=\"transform:translateY(-2px);\">Download CV (PDF)<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px;justify-content:center;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:500;\">\n        <a href=\"https://alejandroendo.itch.io/\" target=\"_blank\" style=\"color:#EEEEEE;text-decoration:none;border:1px solid rgba(238,238,238,.45);border-radius:8px;padding:8px 15px;\" style-hover=\"background:#EEEEEE;color:var(--accent,#CB2957);\">itch.io<\u002Fa>\n        <a href=\"#\" style=\"color:#EEEEEE;text-decoration:none;border:1px solid rgba(238,238,238,.45);border-radius:8px;padding:8px 15px;\" style-hover=\"background:#EEEEEE;color:var(--accent,#CB2957);\">Google Play<\u002Fa>\n        <a href=\"https://www.linkedin.com/in/alejandro-endo-5b5636129/\" target=\"_blank\" style=\"color:#EEEEEE;text-decoration:none;border:1px solid rgba(238,238,238,.45);border-radius:8px;padding:8px 15px;\" style-hover=\"background:#EEEEEE;color:var(--accent,#CB2957);\">LinkedIn<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#1A1A1A;color:#EEEEEE;padding:72px 28px 52px;text-align:center;overflow:hidden;\">\n    <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:clamp(52px,13vw,140px);line-height:.88;letter-spacing:-.03em;color:#EEEEEE;margin-bottom:32px;\">\n      <div>alejandro<\u002Fdiv>\n      <div style=\"color:var(--accent,#CB2957);\">endo<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:500;letter-spacing:.06em;color:rgba(238,238,238,.5);text-transform:uppercase;\">© 2026 Alejandro Endo · Solo game developer · Designer by profession, developer by choice<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Raspberry&quot;,&quot;Slate&quot;,&quot;Ink&quot;],&quot;default&quot;:&quot;Raspberry&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;heroStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Dark&quot;,&quot;Light&quot;],&quot;default&quot;:&quot;Dark&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;softShadows&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  computed() {\n    const p = this.props || {};\n    const accent = ({ Raspberry: '#CB2957', Slate: '#40607F', Ink: '#1A1A1A' })[p.accent] || '#CB2957';\n    const heroDark = (p.heroStyle ?? 'Dark') !== 'Light';\n    const soft = p.softShadows ?? true;\n    return {\n      '--accent': accent,\n      '--hero-bg': heroDark ? '#1A1A1A' : '#EEEEEE',\n      '--hero-ink': heroDark ? '#EEEEEE' : '#1A1A1A',\n      '--hero-sub': heroDark ? 'rgba(238,238,238,.68)' : 'rgba(26,26,26,.66)',\n      '--hero-line': heroDark ? '#2A2A2A' : '#DDDDDD',\n      '--hero-chip': heroDark ? 'rgba(238,238,238,.24)' : 'rgba(26,26,26,.2)',\n      '--shadow': soft ? '0 8px 26px rgba(0,0,0,.06)' : '0 0 0 1px #DDDDDD',\n      '--shadow-sm': soft ? '0 4px 16px rgba(0,0,0,.05)' : 'none',\n    };\n  }\n  applyVars(el) {\n    if (!el) return;\n    const v = this.computed();\n    for (const k in v) el.style.setProperty(k, v[k]);\n  }\n  componentDidMount() { this.applyVars(this._root); }\n  componentDidUpdate() { this.applyVars(this._root); }\n  renderVals() {\n    return {\n      setRoot: (el) => { this._root = el; this.applyVars(el); },\n      logs: [\n        { date: '2026.05', title: 'Tuning the wave curve in Wind Shear', read: '6 min' },\n        { date: '2026.02', title: 'What three years of VR side-projects taught me', read: '9 min' },\n        { date: '2025.11', title: 'Procedural levels that still feel authored — Dark Havoc', read: '7 min' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
